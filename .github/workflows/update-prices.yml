name: Update closing prices daily

on:
  schedule:
    # 美股週一~週五收盤(20:00 UTC)後跑。GitHub 排程是「盡力而為」會延遲/偶爾跳過，
    # 故排兩個時段做備援：主要收盤後~1hr，備援隔日凌晨補抓。腳本 idempotent，抓到同一
    # 收盤不會重複 commit。台灣時間對應：主要 ≈ 05:05、備援 ≈ 08:20。
    - cron: '5 21 * * 1-5'    # 21:05 UTC 主要
    - cron: '20 0 * * 2-6'    # 00:20 UTC 隔日備援（週二~六 補週一~五收盤）
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch closing prices
        run: python fetch_prices.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet prices.json; then
            git add prices.json
            git commit -m "Daily prices $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No price change."
          fi
