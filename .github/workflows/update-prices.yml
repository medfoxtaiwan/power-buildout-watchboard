name: Update closing prices daily

on:
  schedule:
    # 每個交易日美股收盤後跑（23:10 UTC ≈ 美東 18:10 / 19:10）
    - cron: '10 23 * * 1-5'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Fetch closing prices
        run: python fetch_prices.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet prices.json; then
            git add prices.json
            git commit -m "Daily prices $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No price change."
          fi
